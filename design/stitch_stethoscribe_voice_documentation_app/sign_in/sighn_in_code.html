<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f9fb;
            font-family: 'Hanken Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .login-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .login-card:hover {
            transform: translateY(-4px);
        }
        .soft-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter">
<div class="grain-overlay"></div>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-secondary-fixed/20 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-primary-fixed/20 rounded-full blur-[80px] -z-10"></div>
<main class="w-full max-w-md flex flex-col items-center text-center">
<!-- Logo Container -->
<div class="mb-12 relative group">
<div class="absolute inset-0 bg-primary/5 rounded-full scale-150 blur-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
<img alt="Stethoscribe Logo" class="w-48 md:w-64 h-auto relative z-10 transition-transform duration-500 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_ZQag3o_mIRHaB2jdzeKEZkS2-eHlYtX2yi7ELuaUD5Fog9ng0LxIdn0KVc1O_2wu7NWOscRCksKr1ERaVyroiNGG3SLPKbEeB2WeWSfiP2U5LEe8x9I8DD7BXt_7dqFGKEXX2Um6Z2VwBwO82aEHkL0HI0mpLPEV7LRHr15pjIQsUsyolYD6i-o0r7UBgSXTdQ6tOUB26YZnj4TkwOP1dQsNW8vB-3XnoNZI57pnGrsek1ToTNh3w6iFiprH1aIdWwsYXkzLGTE"/>
</div>
<!-- Typography Branding -->
<div class="space-y-4 mb-16 px-4">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">
                Stethoscribe
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant font-medium opacity-80">
                You examine. It writes.
            </p>
</div>
<!-- Action Section -->
<div class="login-card w-full bg-surface-container-lowest rounded-[32px] p-8 border border-outline-variant/30 flex flex-col items-center gap-8">
<div class="w-full space-y-6">
<!-- Google Sign-In Button -->
<button class="w-full flex items-center justify-center gap-4 bg-white hover:bg-surface-container-low text-on-surface font-headline-sm text-headline-sm-mobile h-touch-target rounded-full transition-all duration-200 border border-outline-variant active:scale-[0.98] group" onclick="this.classList.add('scale-95')">
<!-- Google G Icon Simulation -->
<svg class="w-6 h-6" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

</svg>
<span>Continue with Google</span>
</button>
<!-- Helpful micro-text -->
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest opacity-60">
                    Trusted by 2,000+ Physicians
                </p>
</div>
<div class="h-px w-full bg-gradient-to-r from-transparent via-outline-variant to-transparent"></div>
<div class="flex flex-col gap-4 text-center">
<p class="font-body-md text-body-md text-on-surface-variant/80">
                    New to Stethoscribe? 
                    <a class="text-primary font-semibold hover:underline underline-offset-4 decoration-2" href="#">Create an account</a>
</p>

<span class="w-2 h-2 rounded-full bg-primary/20"></span>
</div>
</div>

</footer>
</main>
<!-- Floating atmospheric element -->
<div class="fixed bottom-12 right-12 hidden lg:flex flex-col items-center gap-3 animate-bounce">
<div class="p-4 bg-secondary-container text-on-secondary-container rounded-full shadow-lg">
<span class="material-symbols-outlined text-[32px]">stethoscope</span>
</div>
<span class="font-label-caps text-label-caps text-secondary font-bold">Secure Portal</span>
</div>
<script>
        // Micro-interaction for the Google button
        const btn = document.querySelector('button');
        btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.96)');
        btn.addEventListener('mouseup', () => btn.style.transform = 'scale(1)');
        btn.addEventListener('mouseleave', () => btn.style.transform = 'scale(1)');

        // Fade in effect on load
        window.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease-out';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 50);
        });
    </script>
</body></html>
